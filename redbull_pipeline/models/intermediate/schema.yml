version: 2

models:
  - name: int_outlets_valid
    description: "Outlet rows that passed the current rejection rules."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - market
              - source_file
              - file_row_number
    columns:
      - name: market
        tests:
          - not_null
      - name: source_file
        tests:
          - not_null
      - name: file_row_number
        tests:
          - not_null
      - name: created_at
        tests:
          - not_null

  - name: int_outlets_rejected
    description: "Outlet rows rejected by the current data quality rules."
    columns:
      - name: error_code
        tests:
          - not_null
      - name: error_reason
        tests:
          - not_null

  - name: int_portfolio_valid
    description: "Portfolio rows that passed the current rejection rules."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - market
              - source_file
              - file_row_number
    columns:
      - name: market
        tests:
          - not_null
      - name: source_file
        tests:
          - not_null
      - name: file_row_number
        tests:
          - not_null
      - name: item_price
        tests:
          - not_null

  - name: int_portfolio_rejected
    description: "Portfolio rows rejected by the current data quality rules."
    columns:
      - name: error_code
        tests:
          - not_null
      - name: error_reason
        tests:
          - not_null

  - name: int_matching_valid
    description: "Matching rows that passed the current rejection rules."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - market
              - source_file
              - file_row_number
    columns:
      - name: market
        tests:
          - not_null
      - name: source_file
        tests:
          - not_null
      - name: file_row_number
        tests:
          - not_null
      - name: created_at
        tests:
          - not_null

  - name: int_matching_rejected
    description: "Matching rows rejected by the current data quality rules."
    columns:
      - name: error_code
        tests:
          - not_null
      - name: error_reason
        tests:
          - not_null
