version: 2

models:
  - name: stg_outlets
    description: "Silver staging view for outlets built from quote-aware bronze parsing and joined back to raw bronze for lineage."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - market
              - source_file
              - file_row_number
    columns:
      - name: market
        description: "Market inferred from file path / ingestion metadata."
        tests:
          - not_null
          - accepted_values:
              values: ['USA', 'GBR', 'DEU']
              quote: true
      - name: source_file
        description: "Source file name from Snowpipe metadata."
        tests:
          - not_null
      - name: file_row_number
        description: "Original row number within the source file."
        tests:
          - not_null
      - name: load_timestamp
        description: "Ingestion timestamp captured in the bronze layer."
        tests:
          - not_null
      - name: raw_record
        description: "Original raw source row joined from raw bronze for lineage and debugging."
        tests:
          - not_null:
              config:
                severity: warn
      - name: segment_type
        description: "Raw segment classification after basic standardization."
        tests:
          - accepted_values:
              values: ['restaurant', 'grocery/convenience store/supermarket/liquor store']
              quote: true
              config:
                severity: warn
      - name: created_at
        description: "Record creation timestamp parsed from the raw file."
        tests:
          - not_null:
              config:
                severity: warn

  - name: stg_portfolio
